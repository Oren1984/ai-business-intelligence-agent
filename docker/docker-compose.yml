# docker/docker-compose.yml
# NeuroOps Insight Engine — Docker Compose
#
# Services:
#   insight-engine : Streamlit AI BI dashboard (port 8501)
#   n8n            : Automation workflow engine (port 5678)

services:
  insight-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
